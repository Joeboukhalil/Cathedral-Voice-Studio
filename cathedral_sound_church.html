<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cathedral Voice with Church Bells</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:40px;
}
button,input{
padding:10px;
margin:10px;
font-size:16px;
}
</style>

</head>

<body>

<h2>Cathedral Voice with Church Bells</h2>

<input type="file" id="audioFile" accept="audio/*"><br>
<button onclick="playEffect()">Play</button>
<button onclick="downloadEffect()">Download</button>

</ul>

<script>

let audioContext = new (window.AudioContext || window.webkitAudioContext)();
let audioBuffer;

document.getElementById("audioFile").addEventListener("change", function(e){

let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function(ev){
audioContext.decodeAudioData(ev.target.result).then(buffer=>{
audioBuffer = buffer;
});
};

reader.readAsArrayBuffer(file);

});

function createCathedralReverb(context){

let length = context.sampleRate * 8;
let impulse = context.createBuffer(2,length,context.sampleRate);

for(let c=0;c<2;c++){

let data = impulse.getChannelData(c);

for(let i=0;i<length;i++){

let decay = Math.pow(1 - i / length, 2);
data[i] = (Math.random()*2-1) * decay * 0.08;

}

}

let convolver = context.createConvolver();
convolver.buffer = impulse;

return convolver;

}

/* church bell generator */
function playBell(context){

let osc = context.createOscillator();
let gain = context.createGain();

osc.type = "sine";
osc.frequency.value = 800;

gain.gain.setValueAtTime(0.6, context.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 3);

osc.connect(gain);
gain.connect(context.destination);

osc.start();
osc.stop(context.currentTime + 3);

}

function buildChain(context, destination){

let source = context.createBufferSource();
source.buffer = audioBuffer;
source.playbackRate.value = 1.12;

let cleanFilter = context.createBiquadFilter();
cleanFilter.type = "highpass";
cleanFilter.frequency.value = 120;

let pitchFilter = context.createBiquadFilter();
pitchFilter.type = "bandpass";
pitchFilter.frequency.value = 1200;

let compressor = context.createDynamicsCompressor();

let cathedral = createCathedralReverb(context);

let dryGain = context.createGain();
dryGain.gain.value = 0.8;

let wetGain = context.createGain();
wetGain.gain.value = 0.6;

source.connect(cleanFilter);
cleanFilter.connect(pitchFilter);
pitchFilter.connect(compressor);

compressor.connect(dryGain);
dryGain.connect(destination);

compressor.connect(cathedral);
cathedral.connect(wetGain);
wetGain.connect(destination);

return source;
}

function playEffect(){

let source = buildChain(audioContext, audioContext.destination);

source.start();

playBell(audioContext);
setTimeout(()=>playBell(audioContext),4000);
setTimeout(()=>playBell(audioContext),8000);

}

async function downloadEffect(){

let offlineContext = new OfflineAudioContext(
audioBuffer.numberOfChannels,
audioBuffer.length,
audioBuffer.sampleRate
);

let source = buildChain(offlineContext, offlineContext.destination);
source.start();

let rendered = await offlineContext.startRendering();

function bufferToWave(abuffer){

let numOfChan = abuffer.numberOfChannels,
length = abuffer.length * numOfChan * 2 + 44,
buffer = new ArrayBuffer(length),
view = new DataView(buffer),
channels = [],
offset = 0,
pos = 0;

function setUint16(data){view.setUint16(pos,data,true);pos+=2;}
function setUint32(data){view.setUint32(pos,data,true);pos+=4;}

setUint32(0x46464952);
setUint32(length-8);
setUint32(0x45564157);

setUint32(0x20746d66);
setUint32(16);
setUint16(1);
setUint16(numOfChan);
setUint32(abuffer.sampleRate);
setUint32(abuffer.sampleRate*2*numOfChan);
setUint16(numOfChan*2);
setUint16(16);

setUint32(0x61746164);
setUint32(length-pos-4);

for(let i=0;i<abuffer.numberOfChannels;i++)
channels.push(abuffer.getChannelData(i));

while(pos<length){
for(let i=0;i<numOfChan;i++){
let sample=Math.max(-1,Math.min(1,channels[i][offset]));
sample=(sample<0?sample*0x8000:sample*0x7FFF);
view.setInt16(pos,sample,true);
pos+=2;
}
offset++;
}

return new Blob([buffer],{type:"audio/wav"});
}

let blob = bufferToWave(rendered);
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "cathedral_voice.wav";
a.click();

URL.revokeObjectURL(url);

}

</script>

</body>
</html>
