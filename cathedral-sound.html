<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>High Pitch Cathedral Voice - Downloadable</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:40px;
}
button,input{
padding:10px;
margin:10px;
font-size:16px;
}
</style>
</head>

<body>

<h2>High Pitch Cathedral Voice</h2>

<input type="file" id="audioFile" accept="audio/*"><br>
<button onclick="playEffect()">Play</button>
<button onclick="downloadEffect()">Download Processed Audio</button>

  <li><a href="https://audio.online-convert.com/convert-to-mp3" target="_blank">Audio Converter Online</a></li>
</ul>

<script>
let audioContext = new (window.AudioContext || window.webkitAudioContext)();
let audioBuffer;

document.getElementById("audioFile").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = function(ev){
        audioContext.decodeAudioData(ev.target.result).then(buffer=>{
            audioBuffer = buffer;
        });
    };
    reader.readAsArrayBuffer(file);
});

// create cathedral reverb
function createCathedralReverb(context){
    let length = context.sampleRate * 8;
    let impulse = context.createBuffer(2,length,context.sampleRate);
    for(let c=0;c<2;c++){
        let data = impulse.getChannelData(c);
        for(let i=0;i<length;i++){
            let decay = Math.pow(1 - i / length, 2);
            data[i] = (Math.random()*2-1) * decay * 0.08;
        }
    }
    let convolver = context.createConvolver();
    convolver.buffer = impulse;
    return convolver;
}

// Play effect
function playEffect(){
    if(!audioBuffer) return alert("Upload an audio file first!");
    let source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.playbackRate.value = 1.12; // higher pitch

    let cleanFilter = audioContext.createBiquadFilter();
    cleanFilter.type = "highpass";
    cleanFilter.frequency.value = 120;

    let pitchFilter = audioContext.createBiquadFilter();
    pitchFilter.type = "bandpass";
    pitchFilter.frequency.value = 1200;
    pitchFilter.Q.value = 1;

    let compressor = audioContext.createDynamicsCompressor();
    compressor.threshold.value = -24;
    compressor.ratio.value = 3;

    let cathedral = createCathedralReverb(audioContext);

    let dryGain = audioContext.createGain();
    dryGain.gain.value = 0.8;
    let wetGain = audioContext.createGain();
    wetGain.gain.value = 0.6;

    // connections
    source.connect(cleanFilter);
    cleanFilter.connect(pitchFilter);
    pitchFilter.connect(compressor);

    compressor.connect(dryGain);
    dryGain.connect(audioContext.destination);

    compressor.connect(cathedral);
    cathedral.connect(wetGain);
    wetGain.connect(audioContext.destination);

    source.start();
}

// Download processed audio
async function downloadEffect(){
    if(!audioBuffer) return alert("Upload an audio file first!");

    let offlineContext = new OfflineAudioContext(
        audioBuffer.numberOfChannels,
        audioBuffer.length,
        audioBuffer.sampleRate
    );

    let source = offlineContext.createBufferSource();
    source.buffer = audioBuffer;
    source.playbackRate.value = 1.12;

    let cleanFilter = offlineContext.createBiquadFilter();
    cleanFilter.type = "highpass";
    cleanFilter.frequency.value = 120;

    let pitchFilter = offlineContext.createBiquadFilter();
    pitchFilter.type = "bandpass";
    pitchFilter.frequency.value = 1200;
    pitchFilter.Q.value = 1;

    let compressor = offlineContext.createDynamicsCompressor();
    compressor.threshold.value = -24;
    compressor.ratio.value = 3;

    let cathedral = createCathedralReverb(offlineContext);

    let dryGain = offlineContext.createGain();
    dryGain.gain.value = 0.8;
    let wetGain = offlineContext.createGain();
    wetGain.gain.value = 0.6;

    source.connect(cleanFilter);
    cleanFilter.connect(pitchFilter);
    pitchFilter.connect(compressor);

    compressor.connect(dryGain);
    dryGain.connect(offlineContext.destination);

    compressor.connect(cathedral);
    cathedral.connect(wetGain);
    wetGain.connect(offlineContext.destination);

    source.start();

    let renderedBuffer = await offlineContext.startRendering();

    // convert to WAV
    function bufferToWave(abuffer) {
        let numOfChan = abuffer.numberOfChannels,
            length = abuffer.length * numOfChan * 2 + 44,
            buffer = new ArrayBuffer(length),
            view = new DataView(buffer),
            channels = [], i, sample,
            offset = 0,
            pos = 0;

        // write WAV header
        setUint32(0x46464952); // "RIFF"
        setUint32(length - 8); 
        setUint32(0x45564157); // "WAVE"
        setUint32(0x20746d66); // "fmt " chunk
        setUint32(16); // length
        setUint16(1); // PCM
        setUint16(numOfChan);
        setUint32(abuffer.sampleRate);
        setUint32(abuffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2);
        setUint16(16); 
        setUint32(0x61746164); // "data"
        setUint32(length - pos - 4);

        for(i=0;i<numOfChan;i++)
            channels.push(abuffer.getChannelData(i));

        while(pos<length){
            for(i=0;i<numOfChan;i++){
                sample = Math.max(-1, Math.min(1, channels[i][offset]));
                sample = (0.5 + sample*0.5) * 65535;
                view.setUint16(pos, sample, true);
                pos += 2;
            }
            offset++;
        }

        function setUint16(data){view.setUint16(pos,data,true); pos+=2;}
        function setUint32(data){view.setUint32(pos,data,true); pos+=4;}
        return new Blob([buffer], {type:"audio/wav"});
    }

    let blob = bufferToWave(renderedBuffer);
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.style.display = 'none';
    a.href = url;
    a.download = 'cathedral_voice.wav';
    document.body.appendChild(a);
    a.click();
    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
